server:
  name: "tgw-gateway"
  host: "0.0.0.0"
  port: 8080
  keep_alive: true
  read_timeout_ms: 3000
  write_timeout_ms: 3000
  body_limit_bytes: 1048576

runtime:
  io_threads: 2
  worker_threads: 4

log:
  level: "info"
  path: "logs/tgw-gateway.log"
  async: false

gateway:
  enable_auth: true
  enable_rate_limit: true
  enable_tracing: true
  request_timeout_ms: 1000

user_service_rpc:
  enabled: false
  host: "127.0.0.1"
  port: 9001
  timeout_ms: 1000

mysql:
  enabled: false
  host: "127.0.0.1"
  port: 3306
  user: "tgw"
  password: "tgw"
  database: "tgw_gateway"

auth:
  enabled: true
  jwt_secret: "tgw-demo-secret"
  token_ttl_seconds: 7200
  rbac_enabled: true
  public_paths:
    - "/health"
    - "/routes"
    - "/metrics"
    - "/debug/traces"
    - "/api/user/login"

rbac:
  - path: "/admin"
    roles: ["admin"]
  - path: "/api/task"
    roles: ["admin"]

rate_limit:
  enabled: true
  window_seconds: 60
  default_max_requests: 100
  redis:
    enabled: false
    host: "127.0.0.1"
    port: 6379
    key_prefix: "tgw:rate_limit"
    fail_open: true
  rules:
    - path: "/api/user/login"
      max_requests: 20
    - path: "/api/user/profile"
      max_requests: 100
    - path: "/api/file"
      max_requests: 100
    - path: "/api/task"
      max_requests: 100

governance:
  enabled: true
  retry:
    enabled: true
    max_attempts: 2
    backoff_ms: 20
    retry_non_idempotent: false
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    open_seconds: 10
    half_open_success_threshold: 2
  fallback:
    enabled: true
    message: "service degraded, fallback response returned"

tracing:
  enabled: true
  service_name: "tgw-gateway"
  sample_ratio: 1.0
  max_finished_spans: 1024
  accept_traceparent: true
  expose_debug_headers: false

routes:
  - name: "user-service-route"
    match_type: "prefix"
    path: "/api/user"
    upstream: "UserService"
    strip_prefix: true
    timeout_ms: 1000

  - name: "file-service-route"
    match_type: "prefix"
    path: "/api/file"
    upstream: "FileMetaService"
    strip_prefix: true
    timeout_ms: 1000

  - name: "task-service-route"
    match_type: "prefix"
    path: "/api/task"
    upstream: "TaskService"
    strip_prefix: true
    timeout_ms: 1000
