server:
  name: "tgw-gateway"
  host: "0.0.0.0"
  port: 8080

runtime:
  io_threads: 2
  worker_threads: 4

log:
  level: "info"
  path: "logs/gateway.log"
  async: false

gateway:
  enable_auth: true
  enable_rate_limit: true
  enable_tracing: true
  request_timeout_ms: 3000

auth:
  enabled: true
  jwt_secret: "tgw-local-dev-secret"
  token_ttl_seconds: 7200
  public_paths:
    - "/api/user/login"

routes:
  - name: "user-service-route"
    match_type: "prefix"
    path: "/api/user"
    upstream: "UserService"
    strip_prefix: true
    timeout_ms: 1000

  - name: "file-service-route"
    match_type: "prefix"
    path: "/api/file"
    upstream: "FileMetaService"
    strip_prefix: true
    timeout_ms: 1500

  - name: "task-service-route"
    match_type: "prefix"
    path: "/api/task"
    upstream: "TaskService"
    strip_prefix: true
    timeout_ms: 2000
