server:
  name: "tgw-gateway"
  host: "0.0.0.0"
  port: 8080

runtime:
  io_threads: 2
  worker_threads: 4

log:
  level: "info"
  path: "logs/tgw-gateway.log"
  async: false

gateway:
  enable_auth: true
  enable_rate_limit: true
  enable_tracing: true
  request_timeout_ms: 1000

auth:
  enabled: true
  jwt_secret: "tgw-demo-secret"
  token_ttl_seconds: 7200
  public_paths:
    - "/health"
    - "/routes"
    - "/metrics"
    - "/debug/traces"
    - "/api/user/login"

rate_limit:
  enabled: true
  window_seconds: 60
  default_max_requests: 100
  rules:
    - path: "/api/user/login"
      max_requests: 20
    - path: "/api/user/profile"
      max_requests: 100
    - path: "/api/file"
      max_requests: 100
    - path: "/api/task"
      max_requests: 100

governance:
  enabled: true
  retry:
    enabled: true
    max_attempts: 2
    backoff_ms: 20
    retry_non_idempotent: false
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    open_seconds: 10
    half_open_success_threshold: 2
  fallback:
    enabled: true
    message: "service degraded, fallback response returned"

tracing:
  enabled: true
  service_name: "tgw-gateway"
  sample_ratio: 1.0
  max_finished_spans: 1024
  accept_traceparent: true
  expose_debug_headers: false

routes:
  - name: "user-service-route"
    match_type: "prefix"
    path: "/api/user"
    upstream: "UserService"
    strip_prefix: true
    timeout_ms: 1000

  - name: "file-service-route"
    match_type: "prefix"
    path: "/api/file"
    upstream: "FileMetaService"
    strip_prefix: true
    timeout_ms: 1000

  - name: "task-service-route"
    match_type: "prefix"
    path: "/api/task"
    upstream: "TaskService"
    strip_prefix: true
    timeout_ms: 1000
